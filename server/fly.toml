app = "uniapply-server"
primary_region = "sjc"

[build]

[env]
  PORT = "3001"
  NODE_ENV = "production"

[mounts]
  source = "uniapply_data"
  destination = "/data"

[[services]]
  protocol = "tcp"
  internal_port = 3001

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "5s"
