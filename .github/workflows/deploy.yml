name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy-backend:
    name: Deploy Backend to Fly.io
    runs-on: ubuntu-latest
    if: |
      contains(toJson(github.event.commits.*.modified), 'server/') ||
      contains(toJson(github.event.commits.*.added), 'server/')
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-frontend:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    if: |
      contains(toJson(github.event.commits.*.modified), 'client/') ||
      contains(toJson(github.event.commits.*.added), 'client/')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install -g vercel
      - run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: client
      - run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: client
      - run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: client
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
